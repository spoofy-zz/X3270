name: Release DMG

on:
  push:
    branches: [main]

jobs:
  # ── Publish pre-built DMGs from dist/ to a single 'latest' GitHub Release ──
  # Build locally with ./package_all.sh, commit dist/, then push.
  # CI never compiles — it just reads the version and publishes.
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout (brings in dist/*.dmg committed by the developer) ─────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Read version from CMakeLists.txt ───────────────────────────────
      - name: Read version
        id: version
        run: |
          VER=$(grep -m1 'project(X3270 VERSION' CMakeLists.txt \
                | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=${VER}"                                   >> "$GITHUB_OUTPUT"
          echo "build=${{ github.run_number }}"                   >> "$GITHUB_OUTPUT"
          echo "tag=v${VER}-build${{ github.run_number }}"        >> "$GITHUB_OUTPUT"

      # ── 3. Verify the DMGs are actually present ───────────────────────────
      - name: Verify DMGs
        run: |
          if ! ls dist/*.dmg 1>/dev/null 2>&1; then
            echo "ERROR: No DMGs found in dist/." >&2
            echo "Run ./package_all.sh locally and commit the dist/ folder before pushing." >&2
            exit 1
          fi
          echo "Found DMGs:"
          ls -lh dist/*.dmg

      # ── 4. Delete previous builds of this version so only one release exists ─
      # Finds every release tagged v<VERSION>-build* and removes it before
      # publishing the new one — keeps the Releases page uncluttered while
      # still using a distinct build-numbered tag for full traceability.
      - name: Delete previous releases for this version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release list --limit 100 --json tagName \
            | jq -r '.[].tagName' \
            | grep -E "^v${VERSION}-build" \
            | xargs -I{} gh release delete {} --yes --cleanup-tag \
            || true

      # ── 5. Publish a fresh versioned release with the committed DMGs ────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "X3270 v${{ steps.version.outputs.version }} (Build ${{ steps.version.outputs.build }})"
          draft: false
          prerelease: false
          files: dist/*.dmg
          body: |
            ## X3270 v${{ steps.version.outputs.version }} — Build ${{ steps.version.outputs.build }}

            Free TN3270/TN3270E terminal emulator for macOS.  
            Built from commit ${{ github.sha }} on `main`.

            ### Download the right DMG for your Mac

            | DMG | For |
            |---|---|
            | `X3270-${{ steps.version.outputs.version }}.dmg` | **Apple Silicon** Macs (M1 / M2 / M3 / M4, 2020 and later) |
            | `X3270-${{ steps.version.outputs.version }}-Intel.dmg` | **Intel** Macs (2019 and earlier) |

            ### Install
            1. Download the DMG that matches your Mac
            2. Open the DMG and drag **X3270.app** to `/Applications`
            3. First launch: right-click → **Open** (app is unsigned — macOS Gatekeeper)

            ### Requirements
            macOS 12 Monterey or later · Apple Silicon **or** Intel

            ---
            *Written by Swen Skalski · https://github.com/el-dockerr/X3270*
